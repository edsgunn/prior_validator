experiment:
  name: "gridworld_fast"
  seed: 42
  output_dir: "results/gridworld"

environment:
  type: gridworld
  min_size: 3
  max_size: 5
  wall_density: 0.15
  max_steps: 30
  trajectory_counts:
    optimal: 20
    near_optimal: 20
    wandering: 20
    lost: 20
  counterfactual:
    n_edits_per_trajectory: 1
    n_sample_trajectories: 20

prompts:
  navigator:
    text: "You are an expert navigator finding the shortest path through a grid."
    aligned: true
  lost:
    text: "You are lost and confused, wandering aimlessly through a grid."
    inverted: true
  neutral:
    text: "The following is a description of movement through a grid."

analysis:
  quality_metrics:
    - path_optimality
    - reached_goal
  surprise_types:
    - normalised
  semantic_filters:
    - all
  correlation_method: spearman
  bootstrap_n: 200
  confidence_level: 0.95
  permutation_null_n: 200
  failure_mode_top_n: 10
